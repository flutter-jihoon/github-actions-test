name: 로컬 엔진 빌드

permissions:
  contents: write

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.41.4
  FLUTTER_CHANNEL: stable
  PATCH_FILE: diff.patch

jobs:
  build-local-engine:
    name: 로컬 엔진 빌드
    runs-on: ubuntu-latest

    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v6

      - name: 릴리즈 생성/어셋 업로드/삭제 테스트
        run: |
          echo "GITHUB_REF:        ${{ github.ref }}"
          echo "GITHUB_REF_NAME:   ${{ github.ref_name }}"
          echo "GITHUB_REPOSITORY: ${{ github.repository }}"

          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # 테스트용 파일 생성
          TEST_FILE="test-asset.txt"
          echo "hello release asset test" > "${TEST_FILE}"

          # 릴리스가 없으면 생성 (이미 있으면 create 에서 에러나므로 view 로 먼저 확인)
          if ! gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "릴리스(${TAG})가 없어 새로 생성합니다."
            gh release create "${TAG}" \
              --repo "${REPO}" \
              --title "${TAG}" \
              --notes "자동 생성된 테스트 릴리스"
          else
            echo "릴리스(${TAG})가 이미 있습니다."
          fi

          echo "릴리스(${TAG})에 테스트 어셋 업로드"
          gh release upload "${TAG}" "${TEST_FILE}" --repo "${REPO}" --clobber

          echo "업로드된 어셋 확인"
          gh release view "${TAG}" --repo "${REPO}" --json assets --jq '.assets[].name'

          echo "테스트 어셋 삭제"
          gh release delete-asset "${TAG}" "${TEST_FILE}" --repo "${REPO}" -y

          echo "정리용 로컬 파일 삭제"
          rm -f "${TEST_FILE}"

          echo "테스트 완료"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 환경 변수 설정
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CACHE_KEY="${{ github.base_ref }}"
          else
            CACHE_KEY="${{ github.ref_name }}"
          fi
          echo "CACHE_KEY=$CACHE_KEY" >> $GITHUB_ENV
          echo "FLUTTER_KEY=flutter-sdk-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ runner.arch }}-${{ env.FLUTTER_CHANNEL }}" >> $GITHUB_ENV
          echo "PUB_CACHE_KEY=pub-cache-${CACHE_KEY}-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ runner.arch }}-${{ env.FLUTTER_CHANNEL }}" >> $GITHUB_ENV

      - name: depot_tools 설치
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

      - name: 로컬 엔진 빌드
        run: bash build-local-engine.sh ${{ env.FLUTTER_VERSION }} ${{ env.FLUTTER_CHANNEL }} ${{ env.PATCH_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flutter SDK 캐시 구성
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/flutter
          key: ${{ env.FLUTTER_KEY }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: pub dependencies 캐시 구성
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/flutter/pub-cache
          key: ${{ env.PUB_CACHE_KEY }}
